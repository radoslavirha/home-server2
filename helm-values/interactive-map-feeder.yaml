apps:
  interactive-map-feeder-api:
    image:
      repository: radoslavirha/interactive-map-feeder
      tag: latest
      pullPolicy: Always
    resources:
      requests:
        cpu: 250m
        memory: 250Mi
      limits:
        cpu: 500m
        memory: 500Mi
    labels:
      component: api
      partOf: iot
    services:
      http:
        enabled: true
        protocol: TCP
        port: 80
        targetPort: 4000
    ingress:
      enabled: true
      serviceRef: http
      pathName: interactive-map-feeder
    templates:
      config:
        file: production.json
        path: /home/app/config
