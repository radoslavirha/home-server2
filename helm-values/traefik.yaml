hostNetwork: true

# Required when hostNetwork: true so CoreDNS is still used for *.svc.cluster.local
# Without this, the host's DNS resolver is used and cluster DNS names don't resolve.
deployment:
  dnsPolicy: ClusterFirstWithHostNet

updateStrategy:
  type: Recreate

ports:
  web:
    port: 80
  udp-miot-prod:
    port: 4000
    protocol: UDP
    # hostNetwork: true — traffic goes directly to Traefik on the host.
    # Exposing via the Service causes kube-proxy to DNAT+SNAT packets,
    # masquerading the client source IP and breaking UDP response routing.
    expose:
      default: false
  udp-miot-sbx:
    port: 4001
    protocol: UDP
    expose:
      default: false
  mqtt:
    port: 1883
    protocol: TCP
    expose:
      default: true
  mongodb:
    port: 27017
    protocol: TCP
    expose:
      default: true
  metrics: null

api:
  dashboard: true
  insecure: true

ingressRoute:
  dashboard:
    enabled: true
    # Custom match rule with Host() so external-dns traefik-proxy source can extract the hostname.
    # The default rule only has PathPrefix, which gives external-dns nothing to work with.
    matchRule: "Host(`traefik.server2.home`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
    entryPoints: [web]
    annotations:
      # traefik-proxy source resolves target from status.loadBalancer.ingress by default.
      # Since the Traefik Service is ClusterIP (no LB), that is always empty.
      # Provide the target IP explicitly so external-dns can create the A record.
      external-dns.alpha.kubernetes.io/target: "192.168.1.201"

service:
  # ClusterIP + externalIPs is the correct pattern for bare metal.
  # LoadBalancer (default) waits for status.loadBalancer.ingress which a bare metal cluster
  # never populates, causing ArgoCD to mark the Service as Progressing forever.
  type: ClusterIP
  externalIPs:
    - 192.168.1.201

# We will route with Gateway API instead.
ingressClass:
  enabled: false

# Enable Gateway API Provider & Disables the KubernetesIngress provider
# Providers tell Traefik where to find routing configuration.
providers:
  kubernetesIngress:
    enabled: false
  kubernetesCRD:
    enabled: true
    # Watch all namespaces so Middleware CRDs in sandbox/production are found
    # when referenced via HTTPRoute ExtensionRef (@kubernetescrd).
    namespaces: []
  kubernetesGateway:
    enabled: true
    statusAddress:
      # The Traefik Service uses externalIPs (not LoadBalancer), so status.loadBalancer is empty
      # and statusAddress.service would never populate Gateway status.addresses.
      # Use a static IP instead so external-dns can resolve HTTPRoute target addresses.
      ip: "192.168.1.201"

## Gateway Listeners
gateway:
  listeners:
    web:           # HTTP listener that matches entryPoint `web`
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All

metrics:
  prometheus: null

# Enable Observability
logs:
  general:
    level: INFO

securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true
  runAsGroup: 0
  runAsNonRoot: false
  runAsUser: 0