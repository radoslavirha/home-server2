# ArgoCD Helm values.
# No secrets here — the admin password hash is injected by Terraform at bootstrap
# time and preserved by ignoreDifferences in the self-management Application.
# This file is also consumed by the ArgoCD self-management Application.
global:
  domain: argocd.server2.home

notifications:
  argocdUrl: http://argocd.server2.home

configs:
  params:
    # Run in HTTP mode; TLS will be terminated externally by Traefik (later).
    server.insecure: "true"
  cm:
    admin.enabled: "true"
    url: http://argocd.server2.home
  secret:
    # argocd-secret is managed externally (Terraform now, ESO/Vault later).
    # Helm must not create or overwrite it.
    createSecret: false

  # SOPS Config Management Plugin.
  # The sidecar below picks this up from the argocd-cmp-cm ConfigMap.
  # It decrypts any *.sops.yaml in the source path and passes regular *.yaml
  # files through unchanged, so a single source directory can mix both.
  cmp:
    create: true
    plugins:
      sops:
        allowConcurrency: true
        lockRepo: false
        discover:
          find:
            glob: "*.sops.yaml"
        generate:
          command: [sh, -c]
          args:
            - |
              set -e
              for f in $(find . -maxdepth 1 -name '*.yaml' | sort); do
                case "$f" in
                  *.sops.yaml) sops --decrypt "$f" ;;
                  *)           cat "$f" ;;
                esac
                printf '\n---\n'
              done

# Disable Dex — no SSO/OIDC needed initially. Re-enable when adding OIDC.
dex:
  enabled: false

# Single-node cluster: 1 replica is sufficient everywhere.
server:
  replicas: 1
  httproute:
    enabled: true
    parentRefs:
      - name: traefik-gateway
        namespace: traefik
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - argocd.server2.home
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
  grpcroute:
    enabled: true
    parentRefs:
      - name: traefik-gateway
        namespace: traefik
    hostnames:
      - grpc.argocd.server2.home
    rules:
      - matches:
          - headers:
              - name: Content-Type
                type: RegularExpression
                value: "^application/grpc.*$"

repoServer:
  replicas: 1

  # Extra volumes shared between the initContainer and the SOPS CMP sidecar.
  volumes:
    # Age private key bootstrapped by Terraform (terraform/apps/sops.tf).
    - name: sops-age-key
      secret:
        secretName: sops-age-key
    # Scratch volume: initContainer downloads the sops binary here.
    - name: custom-tools
      emptyDir: {}
    # Plugin definition generated by configs.cmp.plugins above.
    - name: argocd-cmp-cm
      configMap:
        name: argocd-cmp-cm

  # Download the sops binary into the shared custom-tools volume so the
  # sidecar can use it without building a custom image.
  initContainers:
    - name: download-sops
      image: alpine:3.21
      command: [sh, -c]
      args:
        - |
          SOPS_VERSION=3.9.4
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          wget -qO /custom-tools/sops \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.${ARCH}"
          chmod +x /custom-tools/sops
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools

  # SOPS CMP sidecar. ArgoCD routing rules use this plugin when an Application
  # source sets `plugin.name: sops` or the source directory contains *.sops.yaml.
  extraContainers:
    - name: sops-cmp
      command: [/var/run/argocd/argocd-cmp-server]
      image: alpine:3.21
      env:
        - name: SOPS_AGE_KEY_FILE
          value: /age/keys.txt
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      volumeMounts:
        # Shared by the chart: argocd-cmp-server binary
        - name: var-files
          mountPath: /var/run/argocd
        # Shared by the chart: plugin socket directory
        - name: plugins
          mountPath: /home/argocd/cmp-server/plugins
        # Shared by the chart: temp directory
        - name: tmp
          mountPath: /tmp
        # Age private key for SOPS decryption
        - name: sops-age-key
          mountPath: /age
          readOnly: true
        # sops binary downloaded by the initContainer
        - name: custom-tools
          mountPath: /usr/local/bin/sops
          subPath: sops
        # Plugin definition (key "sops.yaml" from argocd-cmp-cm ConfigMap)
        - name: argocd-cmp-cm
          mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: sops.yaml

applicationSet:
  replicas: 1

controller:
  replicas: 1
