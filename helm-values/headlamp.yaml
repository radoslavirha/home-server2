# Use native HTTPRoute instead of Ingress for consistency with the Gateway API stack.
# external-dns watches gateway-httproute source and will auto-create the DNS record.
httpRoute:
  enabled: true
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - headlamp.server2.home

# Default clusterRoleName is cluster-admin — full access needed for a cluster management UI.
clusterRoleBinding:
  clusterRoleName: cluster-admin
