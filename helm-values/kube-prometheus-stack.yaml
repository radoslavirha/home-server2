grafana:
  admin:
    existingSecret: kube-prometheus-stack-grafana-auth-admin
    userKey: admin-user
    passwordKey: admin-password
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: monitoring
    datasources:
      enabled: true
      searchNamespace: monitoring
    alerts:
      enabled: true
      searchNamespace: monitoring
  route:
    main:
      enabled: true
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      hostnames:
        - grafana.server2.home
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: traefik-gateway
          namespace: traefik
  envFromSecrets:
    - name: kube-prometheus-stack-grafana-auth-datasource-influxdb2