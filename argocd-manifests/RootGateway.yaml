# Gateway App-of-Apps root: Traefik + ExternalDNS.
# Applied once by Terraform (terraform/apps). ArgoCD auto-syncs from that point on.
# Manual apply on rebuild: kubectl apply -f argocd-manifests/Root-gateway.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/radoslavirha/home-server2
    targetRevision: HEAD
    path: argocd-manifests/apps/gateway
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
