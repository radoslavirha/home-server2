apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: emqx
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://repos.emqx.io/charts
      chart: emqx
      targetRevision: 5.8.9
      helm:
        valueFiles:
          - $values/helm-values/emqx.yaml
    - repoURL: https://github.com/radoslavirha/home-server2
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/radoslavirha/home-server2
      targetRevision: HEAD
      path: k8s-manifests/emqx
  destination:
    server: https://kubernetes.default.svc
    namespace: mqtt
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      enabled: true
      selfHeal: true
      prune: true
