apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miot-bridge-api-iot-sandbox
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: default
  sources:
    - repoURL: https://github.com/radoslavirha/home-server2
      targetRevision: HEAD
      path: helm-charts/iot-applications
      helm:
        releaseName: miot-bridge-api-iot
        valueFiles:
          - $values/helm-values/miot-bridge.yaml
          - $values/helm-values/sandbox/miot-bridge.yaml
          - $values/helm-values/sandbox/variables.yaml
    - repoURL: https://github.com/radoslavirha/home-server2
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/radoslavirha/home-server2
      targetRevision: HEAD
      path: k8s-manifests/sandbox/miot-bridge-api
  destination:
    server: https://kubernetes.default.svc
    namespace: sandbox
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      enabled: true
      selfHeal: true
      prune: true